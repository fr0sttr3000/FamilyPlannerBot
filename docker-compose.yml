# docker-compose.yml — Production
# FamilyPlannerBot v1.0.0
# Правила:
#   - Pinned-теги (не :latest)
#   - Секреты только через env_file (.env)
#   - restart: unless-stopped для обоих сервисов
#   - Non-root user в bot-контейнере (botuser, определён в Dockerfile)
#   - Resource limits: bot=256m, db=512m
#   - JSON-file logging с ротацией
#   - Порт 5432 НЕ публикуется на хост (NFR-SEC-05)

version: "3.9"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    # pinned-тег через APP_VERSION из .env; fallback = v1.0.0 (не :latest)
    image: familyplannerbot:${APP_VERSION:-v1.0.0}
    container_name: fpb_bot
    restart: unless-stopped
    # Non-root user, определённый в Dockerfile (RUN useradd botuser)
    user: "botuser"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backups:/app/backups
    networks:
      - fpb_internal
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:15-alpine
    container_name: fpb_db
    restart: unless-stopped
    # Секреты передаются через env_file; прямые значения запрещены
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - fpb_internal
    # Порт 5432 НЕ публикуется на хост (NFR-SEC-05)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  pg_data:
    driver: local
  backups:
    driver: local

networks:
  fpb_internal:
    driver: bridge
